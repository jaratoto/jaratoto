<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join jaratoto and get a chance to win exciting promotions!">
    <meta name="keywords" content="jaratoto, lotto, promotions, betting">
    <title>Jaratoto - Win Exciting Prizes!</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Jaratoto",
      "url": "http://jaratoto.com",
      "logo": "http://jaratoto.com/logo.png",
      "sameAs": [
        "http://facebook.com/jaratoto",
        "http://twitter.com/jaratoto"
      ]
    }
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background: #ffcc00;
            padding: 10px 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .cta {
            background: #007bff;
            color: white;
            padding: 10px;
            text-align: center;
        }
        .testimonial {
            border-top: 1px solid #ccc;
            margin: 20px 0;
            padding-top: 20px;
        }
        footer {
            text-align: center;
            padding: 20px 0;
            background: #f4f4f4;
        }
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to Jaratoto!</h1>
    <p>Get a chance to win Bonus Rp 10 juta!</p>
</header>

<div class="container">
    <div class="cta">
        <h2>Join Us Now!</h2>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <button type="submit">Submit</button>
        </form>
    </div>

    <div class="testimonial">
        <p>"Jaratoto has changed my life! Winning is so easy!" - User A</p>
        <p>"Fantastic support and great prizes!" - User B</p>
    </div>
</div>

<footer>
    <p>&copy; 2026 Jaratoto. All Rights Reserved.</p>
</footer>

<script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var name = document.getElementById('name').value;
        var message = "Hello! I'm interested in Jaratoto. My name is " + name;
        var whatsappUrl = "https://wa.me/1234567890?text=" + encodeURIComponent(message); // replace with your WhatsApp number
        window.open(whatsappUrl, '_blank');
    });
</script>

</body>
</html>
