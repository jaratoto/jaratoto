<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Converting Slot Landing Page</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        h1 { color: #d9534f; }
        .bonus { font-size: 24px; color: #5cb85c; }
        .urgency { font-size: 20px; color: #d9534f; }
        .social-proof { margin: 20px 0; font-style: italic; }
        .form { margin-top: 20px; }
        input[type="text"] { width: 80%; padding: 10px; margin-top: 10px; }
        input[type="submit"] { padding: 10px 20px; background-color: #5cb85c; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Our Thrilling Slot Games!</h1>
        <div class="bonus">Claim Your Rp 10 Million Bonus Today!</div>
        <div class="urgency">Hurry! Offer ends soon!</div>
        <div class="social-proof">Join thousands of satisfied players!</div>
        <h2>Be a Winner!</h2>
        <form class="form">
            <label for="phone">Enter your phone number:</label><br>
            <input type="text" id="phone" name="phone" required placeholder="Your phone number"><br>
            <input type="submit" value="Get Started">
        </form>
    </div>
</body>
</html>
